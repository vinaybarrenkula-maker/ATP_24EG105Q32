services:
  # Backend Web Service (Free tier - only 1 allowed per account)
  - type: web
    name: emp-app-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DB_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend Static Site (Always Free - no limit)
  - type: static
    name: emp-app-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
